<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小A · 心理健康助手</title>
<style>
:root {
  --bg-dark: #0d0a1a;
  --bg-mid: #1a1040;
  --purple-deep: #2d1b69;
  --purple-mid: #6c3fcf;
  --purple-light: #a78bfa;
  --pink: #f472b6;
  --yellow: #facc15;
  --yellow-dark: #d4a017;
  --cyan: #70f3ff;
  --green: #34d399;
  --red: #ff6b6b;
  --text: #f0e6ff;
  --muted: #8b7faa;
  --surface: rgba(30, 20, 60, 0.7);
  --glass-border: rgba(167, 139, 250, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'PingFang SC', 'SF Pro Display', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ====== Canvas粒子背景 ====== */
#particleCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ====== 动态渐变背景 ====== */
.bg-gradient {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(160deg, #0d0a1a 0%, #1a1040 40%, #2d1b69 100%);
  animation: bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0% { background: linear-gradient(160deg, #0d0a1a 0%, #1a1040 40%, #2d1b69 100%); }
  33% { background: linear-gradient(160deg, #0a0d2e 0%, #1e1050 40%, #3b1f80 100%); }
  66% { background: linear-gradient(160deg, #150a28 0%, #251548 40%, #4c1d95 100%); }
  100% { background: linear-gradient(160deg, #0d1025 0%, #1a1255 40%, #351870 100%); }
}

/* ====== 极光效果 ====== */
.aurora {
  position: fixed; top: -40%; left: -20%; width: 140%; height: 80%;
  z-index: 0; pointer-events: none; opacity: 0.15;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(167, 139, 250, 0.3) 20%,
    rgba(112, 243, 255, 0.2) 40%,
    rgba(52, 211, 153, 0.15) 55%,
    rgba(244, 114, 182, 0.2) 70%,
    transparent 100%
  );
  filter: blur(60px);
  animation: auroraWave 12s ease-in-out infinite alternate;
}
.aurora:nth-child(2) {
  top: -30%; opacity: 0.1; animation-delay: -4s;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(244, 114, 182, 0.25) 25%,
    rgba(250, 204, 21, 0.15) 50%,
    rgba(112, 243, 255, 0.2) 75%,
    transparent 100%
  );
  filter: blur(80px);
  animation-duration: 16s;
}
@keyframes auroraWave {
  0% { transform: translateX(-5%) skewX(-5deg) scaleY(1); }
  50% { transform: translateX(3%) skewX(3deg) scaleY(1.1); }
  100% { transform: translateX(-2%) skewX(-2deg) scaleY(0.95); }
}

/* ====== 浮动装饰 ====== */
.bg-decor {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
}

/* 彩虹弧 */
.rainbow-arc {
  position: absolute; width: 220px; height: 110px;
  border-radius: 110px 110px 0 0;
  border: 5px solid transparent;
  border-image: linear-gradient(90deg, #ff6b6b, #facc15, #34d399, #70f3ff, #a78bfa, #f472b6) 1;
  opacity: 0.15; transform: rotate(-20deg);
  animation: rainbowFloat 16s ease-in-out infinite alternate;
}
@keyframes rainbowFloat {
  0% { transform: rotate(-20deg) translateY(0); opacity: 0.15; }
  100% { transform: rotate(-15deg) translateY(-20px); opacity: 0.2; }
}

/* 轨道环 */
.orbit-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(167, 139, 250, 0.08);
  animation: orbitSpin var(--dur, 40s) linear infinite;
}
.orbit-ring .orbit-dot {
  position: absolute; width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
  top: -3px; left: 50%; margin-left: -3px;
}
@keyframes orbitSpin { to { transform: rotate(360deg); } }

/* 浮动泡泡 */
.bg-decor .bubble {
  position: absolute; border-radius: 50%;
  animation: floatBubble var(--dur, 14s) ease-in-out infinite;
  opacity: var(--op, 0.15);
}
@keyframes floatBubble {
  0%, 100% { transform: translateY(0) translateX(0) scale(1); }
  25% { transform: translateY(-30px) translateX(10px) scale(1.05); }
  50% { transform: translateY(-15px) translateX(-8px) scale(0.97); }
  75% { transform: translateY(-35px) translateX(5px) scale(1.02); }
}

/* emoji 浮动 */
.bg-decor .emoji-deco {
  position: absolute; font-size: var(--size, 22px);
  animation: floatEmoji var(--dur, 10s) ease-in-out infinite;
  opacity: 0.3; user-select: none;
}
@keyframes floatEmoji {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
  33% { transform: translateY(-22px) rotate(10deg) scale(1.1); }
  66% { transform: translateY(-10px) rotate(-8deg) scale(0.95); }
}

/* 闪烁星星 */
.bg-decor .star {
  position: absolute; font-size: var(--size, 14px);
  animation: starTwinkle var(--dur, 3s) ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.7) rotate(0deg); }
  50% { opacity: 0.8; transform: scale(1.3) rotate(20deg); }
}

/* 漂浮云朵 */
.bg-decor .cloud {
  position: absolute; opacity: 0.06; font-size: 60px;
  animation: cloudDrift var(--dur, 30s) linear infinite;
}
@keyframes cloudDrift {
  from { transform: translateX(-150px); }
  to { transform: translateX(calc(100vw + 150px)); }
}

/* ====== 流星 ====== */
.meteor {
  position: fixed; z-index: 1; pointer-events: none;
  width: 2px; height: 80px;
  background: linear-gradient(to bottom, rgba(112,243,255,0.8), transparent);
  border-radius: 2px;
  animation: meteorFall var(--dur, 1.5s) linear forwards;
  transform: rotate(35deg);
}
@keyframes meteorFall {
  0% { opacity: 1; transform: rotate(35deg) translateY(-100px); }
  70% { opacity: 0.8; }
  100% { opacity: 0; transform: rotate(35deg) translateY(100vh); }
}

/* ====== 烟花爆发 ====== */
.firework {
  position: fixed; z-index: 1; pointer-events: none;
  width: 6px; height: 6px; border-radius: 50%;
  animation: fireworkBurst 1s ease-out forwards;
}
@keyframes fireworkBurst {
  0% { transform: scale(0); opacity: 1; box-shadow: 0 0 6px 2px currentColor; }
  50% { transform: scale(1.5); opacity: 0.8; box-shadow: 0 0 20px 4px currentColor; }
  100% { transform: scale(3); opacity: 0; box-shadow: 0 0 40px 8px currentColor; }
}

/* ====== 手机状态栏 ====== */
.status-bar {
  flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
  padding: 8px 20px 4px; font-size: 12px; font-weight: 600; color: var(--text);
  position: relative; z-index: 5;
}
.status-bar .signal { display: flex; gap: 2px; align-items: flex-end; }
.status-bar .signal span { width: 3px; border-radius: 1px; background: var(--text); }
.status-bar .signal span:nth-child(1) { height: 5px; }
.status-bar .signal span:nth-child(2) { height: 8px; }
.status-bar .signal span:nth-child(3) { height: 11px; }
.status-bar .signal span:nth-child(4) { height: 14px; }
.status-bar .battery { display: flex; align-items: center; gap: 4px; }
.status-bar .battery-body { width: 22px; height: 10px; border: 1.5px solid var(--text); border-radius: 2px; position: relative; }
.status-bar .battery-body::after { content: ''; position: absolute; right: -4px; top: 2px; width: 2px; height: 4px; background: var(--text); border-radius: 0 1px 1px 0; }
.status-bar .battery-fill { position: absolute; left: 1px; top: 1px; bottom: 1px; width: 70%; background: var(--green); border-radius: 1px; }

/* ====== 标题区 ====== */
.header {
  flex-shrink: 0; text-align: center; padding: 8px 20px 12px;
  position: relative; z-index: 5;
}
.header h1 {
  font-size: 18px; font-weight: 700; letter-spacing: 0.5px;
  background: linear-gradient(90deg, var(--purple-light), var(--pink), var(--cyan));
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleGradient 4s ease-in-out infinite alternate;
}
@keyframes titleGradient {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
.header .sub {
  font-size: 12px; color: var(--muted); margin-top: 2px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.header .sub .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
@keyframes pulse { 50% { opacity: .3; } }

/* ====== 机器人区 ====== */
.robot-area {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  padding: 0 20px 12px; position: relative; z-index: 5;
}

/* 彩虹旋转环 */
.robot-ring {
  width: 100px; height: 100px; border-radius: 50%; position: relative;
  display: flex; align-items: center; justify-content: center;
  background: conic-gradient(#ff6b6b, #facc15, #34d399, #70f3ff, #a78bfa, #f472b6, #ff6b6b);
  padding: 3px; transition: all .5s;
  animation: ringRotate 6s linear infinite;
}
.robot-ring::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(#ff6b6b, #facc15, #34d399, #70f3ff, #a78bfa, #f472b6, #ff6b6b);
  filter: blur(14px); opacity: 0.6; z-index: -1;
  animation: ringGlow 3s ease-in-out infinite alternate;
}
@keyframes ringRotate { to { transform: rotate(360deg); } }
@keyframes ringGlow { 0% { opacity: 0.4; } 100% { opacity: 0.7; } }

/* 机器人头部 */
.robot-head {
  width: 80px; height: 72px; border-radius: 16px;
  background: linear-gradient(180deg, #4c1d95, #6c3fcf);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 4px 20px rgba(108, 63, 207, 0.4);
  animation: headBob 4s ease-in-out infinite;
}
@keyframes headBob {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-3px) rotate(1deg); }
  75% { transform: translateY(2px) rotate(-1deg); }
}
.robot-head::before {
  content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 10px; border-radius: 4px 4px 0 0;
  background: linear-gradient(180deg, var(--pink), var(--purple-mid));
}
.robot-head::after {
  content: ''; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%; background: var(--yellow);
  box-shadow: 0 0 10px var(--yellow); animation: antennaBlink 2s ease-in-out infinite;
}
@keyframes antennaBlink { 0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--yellow); } 50% { opacity: 0.3; box-shadow: 0 0 20px var(--yellow); } }

.robot-screen {
  width: 56px; height: 34px; border-radius: 8px;
  background: radial-gradient(circle at 50% 40%, #1a1540, #0a0820);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
}
.robot-eyes { display: flex; gap: 12px; }
.robot-eye {
  width: 10px; height: 12px; border-radius: 50%; background: #fff;
  position: relative; transition: all .3s;
  box-shadow: 0 0 6px rgba(255,255,255,0.3);
}
.robot-eye::after {
  content: ''; position: absolute; width: 5px; height: 5px; border-radius: 50%;
  background: #1a1040; top: 2px; left: 2px; transition: all .3s;
}
.robot-mouth {
  width: 14px; height: 4px; border-radius: 0 0 8px 8px;
  background: rgba(255,255,255,0.8); transition: all .4s;
}

/* 机器人状态 */
.robot-ring.talking { animation: ringRotate 2s linear infinite; }
.robot-ring.talking .robot-mouth { height: 8px; border-radius: 8px; animation: mouthTalk .3s infinite alternate; }
.robot-ring.talking .robot-head { animation: headBob 1s ease-in-out infinite; }
.robot-ring.happy .robot-mouth { width: 20px; height: 8px; border-radius: 0 0 12px 12px; }
.robot-ring.happy .robot-eye { height: 8px; border-radius: 8px 8px 0 0; }
.robot-ring.thinking .robot-eye::after { top: 0; width: 4px; height: 4px; }
.robot-ring.thinking .robot-head { animation: headThink 1.5s ease-in-out infinite; }
@keyframes headThink {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(5deg); }
  75% { transform: rotate(-5deg); }
}
@keyframes mouthTalk { from { height: 8px; } to { height: 3px; } }

.robot-body {
  width: 36px; height: 18px; margin-top: -2px; border-radius: 4px 4px 6px 6px;
  background: linear-gradient(180deg, var(--yellow), var(--yellow-dark));
  box-shadow: 0 2px 10px rgba(250, 204, 21, 0.3);
  position: relative;
}
.robot-body::before, .robot-body::after {
  content: ''; position: absolute; top: 2px;
  width: 8px; height: 12px; border-radius: 3px;
  background: var(--yellow-dark);
}
.robot-body::before { left: -10px; transform: rotate(-15deg); animation: armWave 3s ease-in-out infinite; }
.robot-body::after { right: -10px; transform: rotate(15deg); }
@keyframes armWave {
  0%, 100% { transform: rotate(-15deg); }
  50% { transform: rotate(-30deg); }
}

/* ====== 聊天区 ====== */
.chat {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 0; position: relative; z-index: 5;
  -webkit-overflow-scrolling: touch;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 3px; }

.msg-row { display: flex; gap: 8px; max-width: 85%; animation: msgIn 0.3s ease-out; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.ai { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.msg-row.ai .msg-avatar {
  background: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
  box-shadow: 0 0 12px rgba(108, 63, 207, 0.4);
}
.msg-row.user .msg-avatar {
  background: linear-gradient(135deg, var(--purple-light), var(--pink));
}

.bubble {
  padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.65;
  word-break: break-word; position: relative;
}
.msg-row.ai .bubble {
  background: var(--surface); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-top-left-radius: 4px;
}
.msg-row.user .bubble {
  background: rgba(108, 63, 207, 0.3); backdrop-filter: blur(10px);
  border: 1px solid rgba(167, 139, 250, 0.35); border-top-right-radius: 4px;
}
.bubble .time { display: block; font-size: 10px; margin-top: 4px; color: var(--muted); text-align: right; }
.bubble.streaming::after { content: '▊'; animation: blink 1s infinite; color: var(--cyan); }
@keyframes blink { 50% { opacity: 0; } }

.typing-box { display: none; align-self: flex-start; margin-left: 38px; }
.typing-box .dots {
  display: flex; gap: 5px; padding: 10px 16px;
  background: var(--surface); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: 16px; border-top-left-radius: 4px;
}
.typing-box .dots span { width: 7px; height: 7px; border-radius: 50%; animation: dotBounce 1.4s ease-in-out infinite; }
.typing-box .dots span:nth-child(1) { background: var(--pink); }
.typing-box .dots span:nth-child(2) { background: var(--purple-light); animation-delay: .2s; }
.typing-box .dots span:nth-child(3) { background: var(--cyan); animation-delay: .4s; }
@keyframes dotBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

/* ====== 输入栏 ====== */
.input-bar {
  flex-shrink: 0; padding: 10px 14px 14px;
  background: rgba(20, 12, 45, 0.85); backdrop-filter: blur(16px);
  border-top: 1px solid var(--glass-border);
  display: flex; gap: 8px; align-items: flex-end;
  position: relative; z-index: 5;
}
.input-bar input {
  flex: 1; background: rgba(30, 20, 60, 0.6);
  border: 1px solid var(--glass-border); border-radius: 24px;
  padding: 11px 16px; font-size: 14px; color: var(--text);
  outline: none; font-family: inherit; transition: all .25s;
}
.input-bar input::placeholder { color: var(--muted); }
.input-bar input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(112, 243, 255, 0.2);
}

.btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  cursor: pointer; flex-shrink: 0; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; position: relative;
}
.btn-send {
  background: linear-gradient(135deg, var(--purple-mid), var(--pink));
  color: #fff; box-shadow: 0 2px 12px rgba(167, 139, 250, 0.3);
}
.btn-send:active { transform: scale(.88); }
.btn-speaker { background: transparent; color: var(--muted); }
.btn-speaker.on { color: var(--pink); }

/* ====== 欢迎界面 ====== */
.welcome {
  text-align: center; padding: 30px 20px 20px;
  animation: welcomeIn 0.8s ease-out;
}
@keyframes welcomeIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.welcome .emoji { font-size: 44px; margin-bottom: 12px; animation: welcomeEmoji 2s ease-in-out infinite; }
@keyframes welcomeEmoji {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.15) rotate(5deg); }
}
.welcome .title {
  font-size: 16px; font-weight: 600;
  background: linear-gradient(90deg, var(--cyan), var(--purple-light), var(--pink));
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: titleGradient 4s ease-in-out infinite alternate;
}
.welcome .desc { font-size: 13px; color: var(--muted); margin-top: 6px; }

::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- 动态渐变背景 -->
<div class="bg-gradient"></div>

<!-- 极光效果 -->
<div class="aurora"></div>
<div class="aurora"></div>

<!-- Canvas粒子 -->
<canvas id="particleCanvas"></canvas>

<!-- 浮动装饰 -->
<div class="bg-decor" id="bgDecor">
  <div class="rainbow-arc" style="top:4%;right:-30px;"></div>
  <div class="orbit-ring" style="width:320px;height:320px;top:5%;left:-100px;--dur:55s;">
    <div class="orbit-dot"></div>
  </div>
  <div class="orbit-ring" style="width:200px;height:200px;bottom:15%;right:-60px;--dur:38s;border-color:rgba(244,114,182,0.06);">
    <div class="orbit-dot" style="background:var(--pink);box-shadow:0 0 10px var(--pink);"></div>
  </div>
  <div class="orbit-ring" style="width:140px;height:140px;top:50%;left:50%;margin-left:-70px;margin-top:-70px;--dur:25s;border-color:rgba(250,204,21,0.06);">
    <div class="orbit-dot" style="background:var(--yellow);box-shadow:0 0 8px var(--yellow);"></div>
  </div>
</div>

<!-- 状态栏 -->
<div class="status-bar">
  <span id="timeDisplay">9:41</span>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="signal"><span></span><span></span><span></span><span></span></div>
    <div class="battery"><div class="battery-body"><div class="battery-fill"></div></div></div>
  </div>
</div>

<!-- 标题 -->
<div class="header">
  <h1>小A · 心理健康助手</h1>
  <div class="sub"><span class="dot"></span>在线 · 倾听中</div>
</div>

<!-- 机器人 -->
<div class="robot-area">
  <div class="robot-ring calm" id="robotRing">
    <div class="robot-head">
      <div class="robot-screen">
        <div class="robot-eyes"><div class="robot-eye"></div><div class="robot-eye"></div></div>
        <div class="robot-mouth"></div>
      </div>
    </div>
  </div>
  <div class="robot-body"></div>
</div>

<!-- 聊天 -->
<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="emoji">👋</div>
    <div class="title">你好，我是小A</div>
    <div class="desc">有什么可以帮你的？</div>
  </div>
</div>
<div class="typing-box" id="typing"><div class="dots"><span></span><span></span><span></span></div></div>

<!-- 输入 -->
<div class="input-bar">
  <button class="btn btn-speaker on" id="speakerBtn" onclick="toggleSpeaker()" title="语音播报">🔊</button>
  <input id="input" placeholder="输入你的问题..." autofocus>
  <button class="btn btn-send" onclick="send()">➤</button>
</div>

<script>
// ====== 时间 ======
function updateTime() {
  document.getElementById('timeDisplay').textContent =
    new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}
updateTime(); setInterval(updateTime, 30000);

// ====== Canvas 粒子系统 ======
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], mouse = { x: -1000, y: -1000 };

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 鼠标/触摸跟踪（粒子交互用）
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
document.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });

const PARTICLE_COLORS = [
  'rgba(167,139,250,', 'rgba(244,114,182,', 'rgba(112,243,255,',
  'rgba(250,204,21,', 'rgba(52,211,153,', 'rgba(255,107,107,'
];

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 1 + Math.random() * 2.5;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
    this.color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    this.alpha = 0.2 + Math.random() * 0.5;
    this.alphaSpeed = 0.003 + Math.random() * 0.005;
    this.alphaDir = 1;
    this.pulse = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.pulse += 0.02;

    // 鼠标排斥
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 100) {
      const force = (100 - dist) / 100 * 0.8;
      this.x += (dx / dist) * force;
      this.y += (dy / dist) * force;
    }

    // 呼吸透明度
    this.alpha += this.alphaSpeed * this.alphaDir;
    if (this.alpha > 0.7) this.alphaDir = -1;
    if (this.alpha < 0.15) this.alphaDir = 1;

    // 边界回绕
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
    if (this.y < -10) this.y = H + 10;
    if (this.y > H + 10) this.y = -10;
  }
  draw() {
    const glow = Math.sin(this.pulse) * 0.15;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color + (this.alpha + glow) + ')';
    ctx.fill();

    // 光晕
    if (this.size > 1.8) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = this.color + (this.alpha * 0.15) + ')';
      ctx.fill();
    }
  }
}

// 粒子连线
function drawConnections() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const alpha = (1 - dist / 120) * 0.08;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(167,139,250,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

// 初始化粒子
const PARTICLE_COUNT = Math.min(80, Math.floor(W * H / 12000));
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  drawConnections();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ====== 流星 ======
function spawnMeteor() {
  const m = document.createElement('div');
  m.className = 'meteor';
  m.style.cssText = `left:${Math.random()*80}%;top:${-20+Math.random()*30}%;--dur:${1+Math.random()*1.5}s;height:${50+Math.random()*60}px;`;
  document.body.appendChild(m);
  setTimeout(() => m.remove(), 3000);
}
setInterval(spawnMeteor, 4000 + Math.random() * 6000);
setTimeout(spawnMeteor, 2000);

// ====== 发送时烟花 ======
function spawnFirework(x, y) {
  const colors = ['#ff6b6b','#facc15','#34d399','#70f3ff','#a78bfa','#f472b6'];
  for (let i = 0; i < 8; i++) {
    const f = document.createElement('div');
    f.className = 'firework';
    const angle = (Math.PI * 2 / 8) * i;
    const dist = 20 + Math.random() * 30;
    f.style.cssText = `left:${x+Math.cos(angle)*dist}px;top:${y+Math.sin(angle)*dist}px;color:${colors[i%colors.length]};`;
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1100);
  }
}

// ====== 聊天核心逻辑 ======
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const typing = document.getElementById('typing');
const spkBtn = document.getElementById('speakerBtn');
let welcome = document.getElementById('welcome');
const robotRing = document.getElementById('robotRing');
let speakerOn = true;

const DEEPSEEK_API = 'https://api.deepseek.com/v1/chat/completions';
const DEEPSEEK_KEY = 'sk-' + '12ab2d12a66a4d73a0e19b5fc7bf1c90';
const SYS_PROMPT = '你是小A，AI心理健康助手。风格：温暖共情像朋友聊天。规则：1.先认可感受再温和引导 2.不评判不说教 3.有自伤倾向建议拨打12355 4.回复150字以内口语化 5.适当用emoji 6.永远用中文回复';

function setRobotState(state) { robotRing.className = 'robot-ring ' + state; }
function resetRobot() { setRobotState('calm'); }

function addBubble(text, isUser) {
  if (welcome) { welcome.remove(); welcome = null; }
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'ai');
  row.innerHTML =
    '<div class="msg-avatar">' + (isUser ? '👤' : '🤖') + '</div>' +
    '<div class="bubble">' + text.replace(/\n/g, '<br>') +
    '<span class="time">' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) + '</span></div>';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row.querySelector('.bubble');
}

function typewriter(bubble, fullText, onDone) {
  bubble.classList.add('streaming');
  bubble.querySelector('.time').textContent = '';
  let i = 0;
  function tick() {
    if (i < fullText.length) {
      bubble.childNodes[0].textContent = fullText.substring(0, i + 1);
      i++; chat.scrollTop = chat.scrollHeight;
      setTimeout(tick, 25 + Math.random() * 20);
    } else {
      bubble.classList.remove('streaming');
      bubble.childNodes[0].textContent = fullText;
      bubble.querySelector('.time').textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      // AI回复完成时来个小烟花
      const rect = bubble.getBoundingClientRect();
      spawnFirework(rect.left + rect.width / 2, rect.top);
      if (onDone) onDone();
    }
  }
  tick();
}

function speak(text) {
  if (!speakerOn) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 1.0; u.pitch = 1.2;
    u.onstart = () => setRobotState('talking');
    u.onend = resetRobot;
    u.onerror = resetRobot;
    window.speechSynthesis.speak(u);
  }
}

function toggleSpeaker() {
  speakerOn = !speakerOn;
  spkBtn.className = 'btn btn-speaker' + (speakerOn ? ' on' : '');
  spkBtn.textContent = speakerOn ? '🔊' : '🔇';
  if (!speakerOn) window.speechSynthesis?.cancel();
}

function send(text) {
  const q = (text || input.value).trim();
  if (!q) return;
  addBubble(q, true);
  if (!text) input.value = '';
  typing.style.display = 'block';
  setRobotState('thinking');
  chat.scrollTop = chat.scrollHeight;

  // 发送按钮位置放烟花
  const btn = document.querySelector('.btn-send');
  const rect = btn.getBoundingClientRect();
  spawnFirework(rect.left + rect.width / 2, rect.top);

  fetch(DEEPSEEK_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_KEY },
    body: JSON.stringify({ model: 'deepseek-chat', temperature: 0.7, messages: [{role:'system',content:SYS_PROMPT},{role:'user',content:q}] })
  })
  .then(r => r.json()).then(data => {
    typing.style.display = 'none'; resetRobot();
    const ans = data.choices?.[0]?.message?.content || '抱歉，请再说一遍...';
    const bubble = addBubble(ans, false);
    typewriter(bubble, ans);
    speak(ans);
  }).catch(e => {
    typing.style.display = 'none'; resetRobot();
    addBubble('我好像走神了，再说一次好吗？', false);
  });
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); send(); } });
</script>
